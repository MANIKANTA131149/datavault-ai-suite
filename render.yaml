services:
  - type: web
    name: datavault-ai-suite
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: VITE_API_URL
        value: https://datavault-ai-suite.onrender.com/api
      - key: KEEP_ALIVE_ENABLED
        value: true
      - key: KEEP_ALIVE_URL
        value: https://datavault-ai-suite.onrender.com/api/health
      - key: JWT_SECRET
        generateValue: true
